<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logg inn</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Avenir Next', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #dbeafe 0%, #e0f2fe 45%, #f8fafc 100%);
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
        }
        .field {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
            background: #fff;
        }
        .field:focus {
            outline: none;
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }
        .submit {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #0f766e 0%, #0f4c81 100%);
            box-shadow: 0 10px 25px rgba(15, 118, 110, 0.28);
        }
        .submit:hover {
            filter: brightness(1.05);
        }
        .error {
            margin: 0 0 12px;
            font-size: 14px;
            color: #b91c1c;
            display: none;
        }
        .error.visible {
            display: block;
        }
    </style>
</head>
<body>
    <form class="panel" method="post" action="/login" autocomplete="off">
        <p id="error" class="error">Feil brukernavn eller passord.</p>
        <input class="field" type="text" name="username" autocomplete="username" placeholder="Brukernavn" required>
        <input class="field" type="password" name="password" autocomplete="current-password" placeholder="Passord" required>
        <button class="submit" type="submit">Logg inn</button>
    </form>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
            document.getElementById('error').classList.add('visible');
        }
    </script>
</body>
</html>
